server {
    listen 80;
    listen [::]:80;
    server_name temnaarea.site www.temnaarea.site;

    root /var/www/temnaarea/site;
    index index.html;

    location /.well-known/acme-challenge/ {
        allow all;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    access_log /var/log/nginx/temnaarea.site.access.log;
    error_log /var/log/nginx/temnaarea.site.error.log;
}
