databases:
  - name: tem-na-area-db-netoluiz
    databaseName: tem_na_area
    user: tem_na_area_user
    plan: free

services:
  - type: web
    name: tem-na-area-api-netoluiz
    runtime: node
    plan: free
    rootDir: backend/node
    buildCommand: npm ci
    startCommand: npm start
    healthCheckPath: /api/v1/health
    envVars:
      - key: TEM_NA_AREA_APP_ENV
        value: production
      - key: TEM_NA_AREA_APP_URL
        value: https://tem-na-area-api-netoluiz.onrender.com
      - key: TEM_NA_AREA_APP_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: tem-na-area-db-netoluiz
          property: connectionString
      - key: CORS_ORIGIN
        value: "*"

  - type: web
    name: tem-na-area-frontend-netoluiz
    runtime: static
    rootDir: frontend
    buildCommand: npm ci && VITE_API_BASE_URL=https://$API_HOST/api/v1 npm run build
    staticPublishPath: ./dist
    envVars:
      - key: API_HOST
        fromService:
          type: web
          name: tem-na-area-api-netoluiz
          envVarKey: RENDER_EXTERNAL_HOSTNAME
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
