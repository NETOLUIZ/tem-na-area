services:
  - type: web
    name: tem-na-area-api-netoluiz
    runtime: node
    plan: free
    rootDir: backend/node
    buildCommand: npm ci
    startCommand: npm start
    healthCheckPath: /api/v1/health
    envVars:
      - key: TEM_NA_AREA_APP_ENV
        value: production
      - key: TEM_NA_AREA_APP_URL
        value: https://tem-na-area-api-netoluiz.onrender.com
      - key: TEM_NA_AREA_APP_KEY
        generateValue: true
      - key: DATABASE_URL
        sync: false
      - key: CORS_ORIGIN
        sync: false
